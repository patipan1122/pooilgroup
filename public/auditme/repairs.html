/* ============================================================ MAIN ============================================================ */
function RepairsPage() {
  const [items, setItems] = React.useState(REPAIRS);
  const [view, setView] = React.useState("split"); // split | kanban
  const [statusFilter, setStatusFilter] = React.useState("all");
  const [urgencyFilter, setUrgencyFilter] = React.useState("all");
  const [selectedId, setSelectedId] = React.useState(REPAIRS[0].id);
  const [showNew, setShowNew] = React.useState(false);
  const [showAssign, setShowAssign] = React.useState(false);
  const [toast, setToast] = React.useState(null);

  React.useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 2400);
    return () => clearTimeout(t);
  }, [toast]);

  const filtered = items.filter(r => {
    if (statusFilter !== "all" && r.status !== statusFilter) return false;
    if (urgencyFilter !== "all" && r.urgency !== urgencyFilter) return false;
    return true;
  });
  const selected = items.find(r => r.id === selectedId) || filtered[0] || items[0];

  const counts = {
    all: items.length,
    new: items.filter(r => r.status === "new").length,
    contacted: items.filter(r => r.status === "contacted").length,
    in_progress: items.filter(r => r.status === "in_progress").length,
    waiting: items.filter(r => r.status === "waiting").length,
    done: items.filter(r => r.status === "done").length,
    cancelled: items.filter(r => r.status === "cancelled").length,
  };
  const urgCounts = {
    all: items.length,
    high: items.filter(r => r.urgency === "high").length,
    medium: items.filter(r => r.urgency === "medium").length,
    low: items.filter(r => r.urgency === "low").length,
  };
  const openCount = counts.new + counts.contacted + counts.in_progress + counts.waiting;
  const totalCost = items.filter(r => r.status !== "cancelled").reduce((acc, r) => acc + (r.cost || 0), 0);

  const moveStatus = (id, toStatus) => {
    setItems(prev => prev.map(r => r.id === id ? {
      ...r,
      status: toStatus,
      timeline: [...r.timeline, { at: "เพิ่งทำ", who: "คุณภัทร", what: `เปลี่ยนสถานะ → ${statusById(toStatus).t}`, icon: "→" }]
    } : r));
    const lbl = statusById(toStatus).t;
    setToast({ text: `ย้ายไป ${lbl}` });
  };

  const assignTech = (id, techId, eta) => {
    setItems(prev => prev.map(r => r.id === id ? {
      ...r,
      techId, eta: eta || r.eta || "TBD",
      status: r.status === "new" ? "contacted" : r.status,
      timeline: [...r.timeline, { at: "เพิ่งทำ", who: "คุณภัทร", what: `มอบหมาย ${techById(techId).name} · ETA ${eta || 'TBD'}`, icon: "→" }]
    } : r));
    setToast({ text: `มอบหมายให้ ${techById(techId).name}` });
  };

  return (
    <div className="flex h-full w-full text-slate-900" style={{ background: "#FAFAF7" }}>
      <Sidebar active="แจ้งซ่อม" openCount={openCount} />
      <div className="flex min-w-0 flex-1 flex-col">
        {/* TOPBAR */}
        <header className="flex items-center gap-3 border-b border-slate-200/70 bg-white/80 px-7 py-3.5 backdrop-blur">
          <div className="flex flex-1 items-center gap-2">
            <span className="text-[12px] text-slate-400">หน้าหลัก</span>
            <span className="text-slate-300">/</span>
            <span className="text-[12px] text-slate-400">ทำงาน</span>
            <span className="text-slate-300">/</span>
            <span className="text-[12px] font-semibold text-slate-900">แจ้งซ่อม</span>
          </div>
          <div className="flex items-center gap-1.5 rounded-full border border-slate-200 bg-slate-50 px-3 py-1.5 text-slate-500">
            {I.search}
            <input className="w-44 bg-transparent text-[12px] outline-none placeholder:text-slate-400" placeholder="หาเรื่องซ่อม รหัส ห้อง..." />
          </div>
          <button className="relative grid h-8 w-8 place-items-center rounded-full border border-slate-200 bg-white text-slate-600 hover:border-slate-300">
            {I.bell}
            <span className="absolute right-1.5 top-1.5 h-1.5 w-1.5 rounded-full bg-rose-500 ring-2 ring-white" />
          </button>
        </header>

        {/* HERO */}
        <div className="border-b border-slate-200/70 bg-[#FAFAF7] px-7 pt-5 pb-4">
          <div className="flex items-end gap-4">
            <div className="flex-1">
              <div className="label">03 · งานซ่อม</div>
              <div className="mt-1 flex items-baseline gap-3">
                <h1 className="text-[28px] font-bold tracking-tight">แจ้งซ่อม</h1>
                <span className="mono text-[12px] text-slate-500">{HOTEL.name}</span>
              </div>
              <div className="mt-1 text-[13px] text-slate-500">ติดตามเรื่องซ่อม · มอบหมายช่าง · ดูค่าใช้จ่ายและประวัติ</div>
            </div>
            <div className="flex items-center gap-0.5 rounded-xl border border-slate-200 bg-white p-1">
              {[{ id: "split", t: "List + Detail", icon: "M4 5 H10 V19 H4 z M14 5 H20 V19 H14 z" },
                { id: "kanban", t: "Kanban", icon: "M3 4 H7 V14 H3 z M9 4 H13 V20 H9 z M15 4 H19 V10 H15 z M15 12 H19 V20 H15 z" }].map(v => (
                <button key={v.id} onClick={() => setView(v.id)}
                  className={`flex items-center gap-1.5 rounded-lg px-3 py-1.5 text-[12px] font-semibold transition ${view===v.id ? "bg-slate-900 text-white" : "text-slate-500 hover:text-slate-900"}`}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d={v.icon} stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round"/></svg>
                  {v.t}
                </button>
              ))}
            </div>
            <button onClick={() => setShowNew(true)} className="flex items-center gap-1.5 rounded-xl bg-blue-600 px-4 py-2 text-[12.5px] font-bold text-white shadow-[0_8px_20px_-6px_rgba(37,99,235,0.5)] hover:bg-blue-700">
              {I.plus} แจ้งซ่อมใหม่
            </button>
          </div>
          {/* Stats */}
          <div className="mt-4 grid grid-cols-5 gap-3">
            <StatTile label="เปิดอยู่" value={openCount} suffix="รายการ" tone="blue" hint={`+${counts.new} ใหม่วันนี้`} />
            <StatTile label="ด่วนมาก" value={urgCounts.high} suffix="รายการ" tone="rose" />
            <StatTile label="กำลังซ่อม" value={counts.in_progress} suffix="รายการ" tone="violet" />
            <StatTile label="รออะไหล่" value={counts.waiting} suffix="รายการ" tone="amber" />
            <StatTile label="ค่าใช้จ่ายเดือนนี้" value={fmtBaht(totalCost)} suffix="" tone="slate" mono />
          </div>
        </div>

        {/* MAIN */}
        <div className="flex flex-1 min-h-0 flex-col">
          {view === "split" ? (
            <SplitView
              items={filtered}
              all={items}
              counts={counts}
              urgCounts={urgCounts}
              statusFilter={statusFilter}
              setStatusFilter={setStatusFilter}
              urgencyFilter={urgencyFilter}
              setUrgencyFilter={setUrgencyFilter}
              selectedId={selected?.id}
              setSelectedId={setSelectedId}
              selected={selected}
              moveStatus={moveStatus}
              onAssign={() => setShowAssign(true)}
            />
          ) : (
            <KanbanView
              items={filtered}
              statusFilter={statusFilter}
              setStatusFilter={setStatusFilter}
              urgencyFilter={urgencyFilter}
              setUrgencyFilter={setUrgencyFilter}
              urgCounts={urgCounts}
              moveStatus={moveStatus}
              setSelectedId={(id) => { setSelectedId(id); setView("split"); }}
            />
          )}
        </div>
      </div>

      {/* MODALS */}
      {showNew && <NewRepairModal onClose={() => setShowNew(false)} onSubmit={(r) => {
        const nid = `RP-2569-${String(15 + items.length).padStart(3,'0')}`;
        const item = {
          id: nid, ...r,
          status: "new", techId: null, eta: null,
          cost: 0, parts: [],
          photoBefore: 1, photoAfter: 0,
          timeline: [{ at: "เพิ่งทำ", who: "คุณภัทร", what: "แจ้งใหม่ + รูป", icon: "+" }],
        };
        setItems(prev => [item, ...prev]);
        setSelectedId(nid);
        setShowNew(false);
        setToast({ text: "แจ้งซ่อมใหม่เรียบร้อย" });
      }} />}
      {showAssign && selected && <AssignModal repair={selected} onClose={() => setShowAssign(false)} onAssign={(tid, eta) => {
        assignTech(selected.id, tid, eta); setShowAssign(false);
      }} />}
      {toast && (
        <div className="fixed bottom-5 left-1/2 -translate-x-1/2 rounded-xl bg-slate-900 px-4 py-2.5 text-[12.5px] font-semibold text-white shadow-2xl" style={{ animation: "fadeIn .2s ease-out" }}>
          {toast.text}
        </div>
      )}
    </div>
  );
}

/* ============================================================ STAT TILE ============================================================ */
function StatTile({ label, value, suffix, tone="slate", hint, mono }) {
  const palette = {
    slate:  { ring: "ring-slate-200", num: "text-slate-900" },
    rose:   { ring: "ring-rose-200",  num: "text-rose-700" },
    amber:  { ring: "ring-amber-200", num: "text-amber-800" },
    emerald:{ ring: "ring-emerald-200", num: "text-emerald-700" },
    blue:   { ring: "ring-blue-200",  num: "text-blue-700" },
    violet: { ring: "ring-violet-200", num: "text-violet-700" },
  }[tone];
  return (
    <div className={`relative overflow-hidden rounded-2xl bg-white px-4 py-3 ring-1 ${palette.ring}`}>
      <div className="text-[10px] font-semibold uppercase tracking-[0.16em] text-slate-400">{label}</div>
      <div className="mt-1 flex items-baseline gap-1.5">
        <span className={`mono ${mono ? "text-[20px]" : "text-[28px]"} font-bold leading-none ${palette.num}`}>{value}</span>
        {suffix && <span className="text-[11px] text-slate-500">{suffix}</span>}
      </div>
      {hint && <div className="mt-1 mono text-[10px] text-emerald-600">{hint}</div>}
    </div>
  );
}

/* ============================================================ FILTER BAR ============================================================ */
function FilterBar({ counts, urgCounts, statusFilter, setStatusFilter, urgencyFilter, setUrgencyFilter }) {
  return (
    <div className="flex flex-wrap items-center gap-1.5 border-b border-slate-200/70 bg-white px-7 py-2.5">
      <span className="label mr-1">STATUS</span>
      <button onClick={() => setStatusFilter("all")} className={`rounded-lg px-2.5 py-1 text-[11.5px] font-semibold ${statusFilter==="all" ? "bg-slate-900 text-white" : "bg-slate-100 text-slate-600 hover:bg-slate-200"}`}>ทั้งหมด <span className="mono ml-0.5 opacity-70">{counts.all}</span></button>
      {STATUSES.filter(s => s.id !== "cancelled").map(s => (
        <button key={s.id} onClick={() => setStatusFilter(statusFilter === s.id ? "all" : s.id)}
          className={`flex items-center gap-1.5 rounded-lg px-2.5 py-1 text-[11.5px] font-semibold ring-1 transition ${statusFilter===s.id ? `${s.bg} ${s.text} ${s.ring}` : "bg-white text-slate-600 ring-slate-200 hover:bg-slate-50"}`}>
          <span className="h-1.5 w-1.5 rounded-full" style={{ background: s.bar }}></span>
          {s.t}
          <span className="mono opacity-70">({counts[s.id]})</span>
        </button>
      ))}
      <span className="label mx-2 ml-3">URGENCY</span>
      <button onClick={() => setUrgencyFilter("all")} className={`rounded-lg px-2.5 py-1 text-[11.5px] font-semibold ${urgencyFilter==="all" ? "bg-slate-900 text-white" : "bg-slate-100 text-slate-600 hover:bg-slate-200"}`}>ทุก urgency</button>
      {Object.entries(URGENCY).map(([k, u]) => (
        <button key={k} onClick={() => setUrgencyFilter(urgencyFilter === k ? "all" : k)}
          className={`flex items-center gap-1.5 rounded-lg px-2.5 py-1 text-[11.5px] font-semibold ring-1 transition ${urgencyFilter===k ? `${u.pillBg} ${u.pillText} ${u.ring}` : "bg-white text-slate-600 ring-slate-200 hover:bg-slate-50"}`}>
          <span className={`h-1.5 w-1.5 rounded-full ${u.dot}`}></span>{u.t} <span className="mono opacity-70">({urgCounts[k]})</span>
        </button>
      ))}
    </div>
  );
}

/* ============================================================ SPLIT VIEW ============================================================ */
function SplitView({ items, counts, urgCounts, statusFilter, setStatusFilter, urgencyFilter, setUrgencyFilter, selectedId, setSelectedId, selected, moveStatus, onAssign }) {
  return (
    <>
      <FilterBar counts={counts} urgCounts={urgCounts} statusFilter={statusFilter} setStatusFilter={setStatusFilter} urgencyFilter={urgencyFilter} setUrgencyFilter={setUrgencyFilter} />
      <div className="flex flex-1 min-h-0">
        {/* LEFT LIST */}
        <div className="scrollbar-slim flex w-[420px] flex-none flex-col gap-1.5 overflow-auto border-r border-slate-200/70 bg-white px-3 py-3">
          {items.length === 0 && (
            <div className="grid place-items-center rounded-xl border border-dashed border-slate-200 bg-slate-50 px-4 py-10 text-center">
              <div className="text-[14px] font-semibold text-slate-700">ไม่มีรายการในตัวกรองนี้</div>
              <div className="mt-1 text-[11px] text-slate-500">ลองเปลี่ยน filter หรือกด "แจ้งซ่อมใหม่"</div>
            </div>
          )}
          {items.map(r => (
            <RepairCard key={r.id} r={r} active={r.id === selectedId} onClick={() => setSelectedId(r.id)} />
          ))}
        </div>
        {/* RIGHT DETAIL */}
        <div className="scrollbar-slim flex-1 overflow-auto bg-[#FAFAF7]">
          {selected ? <DetailPanel r={selected} moveStatus={moveStatus} onAssign={onAssign} /> : <div className="grid place-items-center p-12 text-slate-400">เลือกเรื่องซ่อมทางซ้าย</div>}
        </div>
      </div>
    </>
  );
}

/* ============================================================ REPAIR CARD ============================================================ */
function RepairCard({ r, active, onClick, compact = false }) {
  const cat = CAT[r.cat];
  const urg = URGENCY[r.urgency];
  const st = statusById(r.status);
  const tech = r.techId ? techById(r.techId) : null;
  return (
    <button onClick={onClick}
      className={`group relative w-full rounded-xl border bg-white px-3 py-2.5 text-left transition ${active ? "border-blue-400 ring-2 ring-blue-100" : "border-slate-200 hover:border-slate-300 hover:shadow-sm"}`}>
      {/* left urgency bar */}
      <span className="absolute left-0 top-2 bottom-2 w-1 rounded-r-full" style={{ background: urg.dot.replace("bg-","").startsWith("rose") ? "#E11D48" : urg.dot.replace("bg-","").startsWith("amber") ? "#F59E0B" : "#10B981" }}></span>
      <div className="flex items-start gap-2.5 pl-2">
        <div className="grid h-9 w-9 flex-none place-items-center rounded-lg text-[16px] ring-1 ring-slate-100" style={{ background: cat.color + "15" }}>
          <span>{cat.emoji}</span>
        </div>
        <div className="min-w-0 flex-1">
          <div className="flex items-center gap-1.5">
            <span className="mono rounded bg-slate-100 px-1.5 py-0.5 text-[9px] font-bold text-slate-600">{r.id.split("-")[2]}</span>
            <span className={`inline-flex items-center gap-1 rounded-md px-1.5 py-0.5 text-[9px] font-bold uppercase tracking-wider ring-1 ${urg.pillBg} ${urg.pillText} ${urg.ring}`}>
              {r.urgency === "high" && <span className="urgent-pulse h-1 w-1 rounded-full bg-rose-500"></span>}
              {urg.t}
            </span>
            {r.guestImpact === "high" && <span className="mono rounded bg-rose-100 px-1 py-0.5 text-[8.5px] font-bold text-rose-700 ring-1 ring-rose-200">กระทบแขก</span>}
          </div>
          <div className="mt-1 truncate text-[13px] font-semibold text-slate-900">{r.title}</div>
          <div className="mt-0.5 flex items-center gap-1.5 text-[10.5px] text-slate-500">
            <span className="flex items-center gap-0.5">{I.pin}{r.location}</span>
          </div>
          <div className="mt-2 flex items-center gap-2">
            <span className={`inline-flex items-center gap-1 rounded-md px-1.5 py-0.5 text-[9.5px] font-bold uppercase tracking-wider ring-1 ${st.bg} ${st.text} ${st.ring}`}>
              <span className="h-1 w-1 rounded-full" style={{ background: st.bar }}></span>{st.t}
            </span>
            {tech && (
              <span className="flex items-center gap-1 text-[10.5px] text-slate-600">
                <span className="grid h-4 w-4 place-items-center rounded-full text-[8.5px] font-bold text-white" style={{ background: tech.color }}>{tech.short[0]}</span>
                {tech.name}
              </span>
            )}
            {r.eta && (
              <span className="mono ml-auto flex items-center gap-0.5 text-[10px] font-semibold text-slate-500">{I.clock}{r.eta}</span>
            )}
            {!tech && r.status === "new" && <span className="mono ml-auto text-[10px] font-bold text-blue-600">รอมอบหมาย</span>}
          </div>
        </div>
      </div>
    </button>
  );
}

/* ============================================================ DETAIL PANEL ============================================================ */
function DetailPanel({ r, moveStatus, onAssign }) {
  const cat = CAT[r.cat];
  const urg = URGENCY[r.urgency];
  const st = statusById(r.status);
  const tech = r.techId ? techById(r.techId) : null;
  const partsTotal = (r.parts || []).reduce((acc, p) => acc + (p.price * (p.qty || 1)), 0);

  // Next status options
  const flow = ["new","contacted","in_progress","waiting","done"];
  const idx = flow.indexOf(r.status);
  const nextStatus = idx >= 0 && idx < flow.length-1 ? flow[idx+1] : null;
  return (
    <div key={r.id} className="px-7 py-5" style={{ animation: "slideUp .25s ease-out" }}>
      {/* HEADER */}
      <div className="flex items-start gap-3">
        <div className="grid h-12 w-12 flex-none place-items-center rounded-xl text-[22px] ring-1 ring-slate-200 bg-white">
          <span>{cat.emoji}</span>
        </div>
        <div className="min-w-0 flex-1">
          <div className="flex items-center gap-1.5">
            <span className="mono rounded bg-slate-900 px-1.5 py-0.5 text-[10px] font-bold text-white">{r.id}</span>
            <span className={`inline-flex items-center gap-1 rounded-md px-1.5 py-0.5 text-[10px] font-bold uppercase tracking-wider ring-1 ${urg.pillBg} ${urg.pillText} ${urg.ring}`}>
              {r.urgency === "high" && <span className="urgent-pulse h-1.5 w-1.5 rounded-full bg-rose-500"></span>}
              {urg.t}
            </span>
            <span className={`inline-flex items-center gap-1 rounded-md px-1.5 py-0.5 text-[10px] font-bold uppercase tracking-wider ring-1 ${st.bg} ${st.text} ${st.ring}`}>
              <span className="h-1.5 w-1.5 rounded-full" style={{ background: st.bar }}></span>{st.t}
            </span>
            <span className="mono text-[10.5px] text-slate-500">{cat.t}</span>
          </div>
          <h2 className="mt-1.5 text-[20px] font-bold leading-tight tracking-tight" style={{ textWrap: "balance" }}>{r.title}</h2>
          <div className="mt-1 flex flex-wrap items-center gap-x-4 gap-y-1 text-[12px] text-slate-500">
            <span className="flex items-center gap-1">{I.pin}{r.location}</span>
            <span className="flex items-center gap-1">{I.user}{r.reportedBy} · {r.reportedAt}</span>
            {r.asset && <span className="mono rounded bg-slate-100 px-1.5 py-0.5 text-[10.5px]">⚙ {r.asset}</span>}
          </div>
        </div>
      </div>

      {/* QUICK ACTIONS */}
      <div className="mt-4 flex flex-wrap items-center gap-2 rounded-2xl border border-slate-200/70 bg-white p-3">
        {nextStatus && (
          <button onClick={() => moveStatus(r.id, nextStatus)} className="flex items-center gap-1.5 rounded-lg bg-blue-600 px-3 py-2 text-[12px] font-bold text-white hover:bg-blue-700">
            ย้ายไป "{statusById(nextStatus).t}" {I.arrow}
          </button>
        )}
        <button onClick={onAssign} className="flex items-center gap-1.5 rounded-lg border border-slate-200 bg-white px-3 py-2 text-[12px] font-semibold text-slate-700 hover:border-slate-300">
          {tech ? "เปลี่ยนช่าง" : "มอบหมายช่าง"}
        </button>
        {r.status !== "done" && r.status !== "cancelled" && (
          <button onClick={() => moveStatus(r.id, "done")} className="flex items-center gap-1.5 rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-[12px] font-bold text-emerald-700 hover:bg-emerald-100">
            ปิดเคส (เสร็จแล้ว) ✓
          </button>
        )}
        {r.status !== "cancelled" && r.status !== "done" && (
          <button onClick={() => moveStatus(r.id, "cancelled")} className="ml-auto flex items-center gap-1.5 rounded-lg border border-slate-200 bg-white px-3 py-2 text-[12px] font-medium text-slate-500 hover:border-rose-200 hover:text-rose-700">
            ยกเลิก
          </button>
        )}
      </div>

      {/* CONTENT GRID */}
      <div className="mt-4 grid grid-cols-12 gap-4">
        {/* LEFT */}
        <div className="col-span-12 lg:col-span-7 space-y-4">
          {/* DESCRIPTION */}
          <div className="rounded-2xl border border-slate-200/70 bg-white p-4">
            <div className="label mb-2">รายละเอียด</div>
            <p className="text-[13px] leading-[1.7] text-slate-700" style={{ textWrap: "pretty" }}>{r.description}</p>
          </div>

          {/* PHOTOS */}
          <div className="rounded-2xl border border-slate-200/70 bg-white p-4">
            <div className="flex items-center justify-between mb-2">
              <div className="label">รูปก่อน / หลัง</div>
              <button className="flex items-center gap-1 text-[11px] font-semibold text-blue-600 hover:underline">{I.cam} เพิ่มรูป</button>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <div className="mb-1.5 mono text-[10px] font-bold uppercase tracking-wider text-rose-600">BEFORE</div>
                <Photo kind={r.photoBefore ? "ph" : null} label="ก่อน" />
              </div>
              <div>
                <div className="mb-1.5 mono text-[10px] font-bold uppercase tracking-wider text-emerald-600">AFTER</div>
                <Photo kind={r.photoAfter ? "ph" : null} label={r.photoAfter ? "หลัง" : "ยังไม่มีรูป"} />
              </div>
            </div>
          </div>

          {/* TIMELINE */}
          <div className="rounded-2xl border border-slate-200/70 bg-white p-4">
            <div className="label mb-3">ไทม์ไลน์ · การเปลี่ยนสถานะ</div>
            <ol className="relative space-y-3 pl-6 before:absolute before:left-2 before:top-1.5 before:bottom-1.5 before:w-px before:bg-slate-200">
              {r.timeline.map((t, i) => (
                <li key={i} className="relative">
                  <span className="absolute -left-[18px] top-0 grid h-4 w-4 place-items-center rounded-full bg-white text-[8.5px] font-bold ring-2 ring-slate-300">{t.icon}</span>
                  <div className="flex items-baseline gap-2">
                    <span className="mono text-[11px] font-bold text-slate-700">{t.at}</span>
                    <span className="text-[11.5px] text-slate-500">·</span>
                    <span className="text-[12px] font-semibold text-slate-800">{t.who}</span>
                  </div>
                  <div className="text-[12px] text-slate-600">{t.what}</div>
                </li>
              ))}
            </ol>
            <div className="mt-3 flex gap-2 border-t border-slate-100 pt-3">
              <input className="flex-1 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-[12px] outline-none placeholder:text-slate-400 focus:bg-white focus:border-blue-300" placeholder="พิมพ์อัพเดต..." />
              <button className="rounded-lg bg-slate-900 px-3 py-2 text-[11.5px] font-bold text-white hover:bg-slate-800">ส่ง</button>
            </div>
          </div>
        </div>

        {/* RIGHT */}
        <div className="col-span-12 lg:col-span-5 space-y-4">
          {/* TECH */}
          <div className="rounded-2xl border border-slate-200/70 bg-white p-4">
            <div className="label mb-2">ช่างที่มอบหมาย</div>
            {tech ? (
              <div className="flex items-center gap-3">
                <div className="grid h-12 w-12 flex-none place-items-center rounded-full text-[14px] font-bold text-white" style={{ background: tech.color }}>{tech.short}</div>
                <div className="flex-1">
                  <div className="text-[13px] font-semibold">{tech.name}</div>
                  <div className="text-[10.5px] text-slate-500">{tech.role}</div>
                  <div className="mt-1 flex flex-wrap gap-1">
                    {tech.skills.map(s => <span key={s} className="mono rounded bg-slate-100 px-1.5 py-0.5 text-[8.5px] font-bold text-slate-600">{s}</span>)}
                  </div>
                </div>
                <button className="grid h-8 w-8 place-items-center rounded-md border border-slate-200 text-slate-500 hover:bg-slate-50" title="โทร">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 4 H9 L11 9 L8 11 a12 12 0 0 0 5 5 L15 13 L20 15 V19 a2 2 0 0 1 -2 2 a18 18 0 0 1 -16 -16 a2 2 0 0 1 2 -2" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round"/></svg>
                </button>
              </div>
            ) : (
              <button onClick={onAssign} className="flex w-full items-center justify-center gap-1.5 rounded-xl border border-dashed border-slate-300 bg-slate-50 px-3 py-3 text-[12.5px] font-semibold text-slate-600 hover:border-slate-400 hover:bg-white">
                {I.plus} มอบหมายช่างให้เรื่องนี้
              </button>
            )}
            {r.eta && tech && (
              <div className="mt-3 flex items-center gap-2 rounded-lg bg-blue-50 px-3 py-2 text-[12px] ring-1 ring-blue-200">
                <span className="text-blue-700">{I.clock}</span>
                <span className="text-slate-600">ETA:</span>
                <span className="mono font-bold text-blue-700">{r.eta}</span>
              </div>
            )}
          </div>

          {/* GUEST IMPACT */}
          <div className={`rounded-2xl border p-4 ${r.guestImpact === "high" ? "border-rose-200 bg-rose-50" : r.guestImpact === "medium" ? "border-amber-200 bg-amber-50" : "border-slate-200 bg-white"}`}>
            <div className="label mb-2">กระทบลูกค้า</div>
            <div className="flex items-center gap-2">
              <span className={`mono rounded px-1.5 py-0.5 text-[10px] font-bold uppercase tracking-wider ${r.guestImpact === "high" ? "bg-rose-600 text-white" : r.guestImpact === "medium" ? "bg-amber-500 text-white" : "bg-emerald-600 text-white"}`}>
                {r.guestImpact === "high" ? "สูง" : r.guestImpact === "medium" ? "ปานกลาง" : "ต่ำ"}
              </span>
              <span className="text-[12px] font-semibold text-slate-800">{r.guestNote || "—"}</span>
            </div>
          </div>

          {/* COST */}
          <div className="rounded-2xl border border-slate-200/70 bg-white p-4">
            <div className="flex items-center justify-between mb-2">
              <div className="label">ค่าใช้จ่าย / อะไหล่</div>
              <button className="text-[11px] font-semibold text-blue-600 hover:underline">+ เพิ่ม</button>
            </div>
            {r.parts && r.parts.length > 0 ? (
              <>
                <table className="w-full text-[12px]">
                  <thead>
                    <tr className="border-b border-slate-100 text-[10px] uppercase tracking-wider text-slate-400">
                      <th className="pb-1.5 text-left font-semibold">รายการ</th>
                      <th className="pb-1.5 text-right font-semibold">จำนวน</th>
                      <th className="pb-1.5 text-right font-semibold">ราคา</th>
                    </tr>
                  </thead>
                  <tbody>
                    {r.parts.map((p, i) => (
                      <tr key={i} className="border-b border-slate-50">
                        <td className="py-1.5 text-slate-700">{p.name}</td>
                        <td className="py-1.5 text-right mono text-slate-500">{p.qty}</td>
                        <td className="py-1.5 text-right mono font-semibold">{fmtBaht(p.price)}</td>
                      </tr>
                    ))}
                  </tbody>
                  <tfoot>
                    <tr>
                      <td className="pt-2 text-[11px] font-semibold text-slate-500" colSpan="2">รวม</td>
                      <td className="pt-2 text-right mono text-[14px] font-bold">{fmtBaht(partsTotal)}</td>
                    </tr>
                  </tfoot>
                </table>
              </>
            ) : (
              <div className="grid place-items-center rounded-lg border border-dashed border-slate-200 bg-slate-50 px-3 py-5 text-center">
                <div className="text-[12px] text-slate-500">ยังไม่มีค่าใช้จ่าย</div>
                <div className="mt-0.5 mono text-[10px] text-slate-400">บันทึกอะไหล่และค่าแรงเมื่อช่างเสร็จงาน</div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================ KANBAN VIEW ============================================================ */
function KanbanView({ items, statusFilter, setStatusFilter, urgencyFilter, setUrgencyFilter, urgCounts, moveStatus, setSelectedId }) {
  const [drag, setDrag] = React.useState(null);
  const [dropCol, setDropCol] = React.useState(null);
  const cols = STATUSES.filter(s => s.id !== "cancelled");
  const counts = {
    new: items.filter(r => r.status === "new").length,
    contacted: items.filter(r => r.status === "contacted").length,
    in_progress: items.filter(r => r.status === "in_progress").length,
    waiting: items.filter(r => r.status === "waiting").length,
    done: items.filter(r => r.status === "done").length,
    all: items.length,
  };
  return (
    <>
      {/* Filter bar — only urgency since status is the kanban */}
      <div className="flex flex-wrap items-center gap-1.5 border-b border-slate-200/70 bg-white px-7 py-2.5">
        <span className="label mr-1">URGENCY</span>
        <button onClick={() => setUrgencyFilter("all")} className={`rounded-lg px-2.5 py-1 text-[11.5px] font-semibold ${urgencyFilter==="all" ? "bg-slate-900 text-white" : "bg-slate-100 text-slate-600 hover:bg-slate-200"}`}>ทุก urgency</button>
        {Object.entries(URGENCY).map(([k, u]) => (
          <button key={k} onClick={() => setUrgencyFilter(urgencyFilter === k ? "all" : k)}
            className={`flex items-center gap-1.5 rounded-lg px-2.5 py-1 text-[11.5px] font-semibold ring-1 transition ${urgencyFilter===k ? `${u.pillBg} ${u.pillText} ${u.ring}` : "bg-white text-slate-600 ring-slate-200 hover:bg-slate-50"}`}>
            <span className={`h-1.5 w-1.5 rounded-full ${u.dot}`}></span>{u.t} <span className="mono opacity-70">({urgCounts[k]})</span>
          </button>
        ))}
        <span className="ml-auto mono text-[10.5px] text-slate-400">ลากการ์ดข้ามคอลัมน์เพื่อเปลี่ยนสถานะ</span>
      </div>
      <div className="scrollbar-slim flex-1 overflow-auto px-7 py-5">
        <div className="grid grid-cols-5 gap-3" style={{ minWidth: 1200 }}>
          {cols.map(col => {
            const colItems = items.filter(r => r.status === col.id);
            const isDrop = dropCol === col.id;
            return (
              <div key={col.id}
                onDragOver={(e) => { e.preventDefault(); setDropCol(col.id); }}
                onDragLeave={() => setDropCol(prev => prev === col.id ? null : prev)}
                onDrop={(e) => { e.preventDefault(); if (drag) moveStatus(drag, col.id); setDrag(null); setDropCol(null); }}
                className={`flex flex-col rounded-2xl border bg-white transition ${isDrop ? "border-blue-400 ring-2 ring-blue-200" : "border-slate-200/70"}`}>
                <div className="flex items-center gap-2 border-b border-slate-100 px-3 py-2.5">
                  <span className="h-2 w-2 rounded-full" style={{ background: col.bar }}></span>
                  <span className="text-[12.5px] font-bold tracking-tight">{col.t}</span>
                  <span className={`mono ml-auto rounded px-1.5 py-0.5 text-[9.5px] font-bold ${col.bg} ${col.text}`}>{counts[col.id]}</span>
                </div>
                <div className="scrollbar-slim flex-1 space-y-1.5 overflow-auto p-2.5" style={{ maxHeight: 700 }}>
                  {colItems.length === 0 && (
                    <div className="grid place-items-center rounded-lg border border-dashed border-slate-200 px-3 py-6 text-center">
                      <div className="mono text-[10px] text-slate-400">ว่าง</div>
                    </div>
                  )}
                  {colItems.map(r => (
                    <div key={r.id}
                      draggable
                      onDragStart={(e) => { setDrag(r.id); e.dataTransfer.effectAllowed = "move"; }}
                      onDragEnd={() => { setDrag(null); setDropCol(null); }}
                      onClick={() => setSelectedId(r.id)}
                      className={`grab ${drag === r.id ? "opacity-40" : ""}`}>
                      <KanbanCard r={r} />
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </>
  );
}

function KanbanCard({ r }) {
  const cat = CAT[r.cat];
  const urg = URGENCY[r.urgency];
  const tech = r.techId ? techById(r.techId) : null;
  const accent = r.urgency === "high" ? "#E11D48" : r.urgency === "medium" ? "#F59E0B" : "#10B981";
  return (
    <div className="relative rounded-xl border border-slate-200 bg-white p-2.5 hover:border-slate-300 hover:shadow-sm">
      <span className="absolute left-0 top-2 bottom-2 w-1 rounded-r-full" style={{ background: accent }}></span>
      <div className="flex items-start gap-2 pl-1.5">
        <span className="grid h-7 w-7 flex-none place-items-center rounded-md text-[13px] ring-1 ring-slate-100" style={{ background: cat.color + "15" }}>{cat.emoji}</span>
        <div className="min-w-0 flex-1">
          <div className="flex items-center gap-1.5">
            <span className="mono rounded bg-slate-100 px-1 py-0.5 text-[8.5px] font-bold text-slate-600">{r.id.split("-")[2]}</span>
            <span className={`mono rounded px-1 py-0.5 text-[8.5px] font-bold uppercase tracking-wider ${urg.pillBg} ${urg.pillText}`}>{urg.t}</span>
            {r.guestImpact === "high" && <span className="text-[10px]">⚠️</span>}
          </div>
          <div className="mt-1 line-clamp-2 text-[12px] font-semibold leading-tight text-slate-900">{r.title}</div>
          <div className="mt-1.5 mono flex items-center gap-1 text-[10px] text-slate-500">{I.pin}{r.location}</div>
        </div>
      </div>
      <div className="mt-2 flex items-center justify-between border-t border-slate-100 pt-1.5">
        {tech ? (
          <span className="flex items-center gap-1 text-[10.5px] text-slate-700">
            <span className="grid h-4 w-4 place-items-center rounded-full text-[8.5px] font-bold text-white" style={{ background: tech.color }}>{tech.short[0]}</span>
            {tech.name}
          </span>
        ) : <span className="mono text-[10px] font-bold text-blue-600">รอมอบหมาย</span>}
        {r.eta && <span className="mono text-[10px] font-semibold text-slate-500">{r.eta}</span>}
      </div>
    </div>
  );
}

/* ============================================================ NEW MODAL ============================================================ */
function NewRepairModal({ onClose, onSubmit }) {
  const [title, setTitle] = React.useState("");
  const [cat, setCat] = React.useState("ac");
  const [urgency, setUrgency] = React.useState("medium");
  const [location, setLocation] = React.useState("");
  const [asset, setAsset] = React.useState("");
  const [description, setDescription] = React.useState("");
  const [guestImpact, setGuestImpact] = React.useState("low");
  const submit = () => {
    if (!title.trim() || !location.trim()) return;
    onSubmit({
      title: title.trim(), cat, urgency, location, asset,
      description: description.trim(), guestImpact, guestNote: "—",
      reportedBy: "คุณภัทร", reportedAt: "เพิ่งทำ",
    });
  };
  return (
    <div className="fixed inset-0 z-40 grid place-items-center bg-slate-900/40 px-6 backdrop-blur-sm" onClick={onClose}>
      <div className="w-full max-w-[560px] overflow-hidden rounded-2xl bg-white shadow-2xl" onClick={(e) => e.stopPropagation()} style={{ animation: "fadeIn .2s ease-out" }}>
        <div className="flex items-center justify-between border-b border-slate-100 px-5 py-3.5">
          <div>
            <div className="label">แจ้งซ่อมใหม่</div>
            <div className="text-[16px] font-bold tracking-tight">เปิดเคสใหม่</div>
          </div>
          <button onClick={onClose} className="grid h-8 w-8 place-items-center rounded-md text-slate-400 hover:bg-slate-50 hover:text-slate-700">{I.close}</button>
        </div>
        <div className="scrollbar-slim max-h-[70vh] overflow-auto px-5 py-4 space-y-3">
          <Field label="หัวข้อ *">
            <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="เช่น แอร์ห้อง 305 ไม่เย็น..." className="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-[13px] outline-none focus:border-blue-400"/>
          </Field>
          <div className="grid grid-cols-2 gap-3">
            <Field label="หมวด">
              <div className="flex flex-wrap gap-1.5">
                {Object.entries(CAT).map(([k, c]) => (
                  <button key={k} type="button" onClick={() => setCat(k)} className={`flex items-center gap-1 rounded-md px-2 py-1 text-[11px] font-semibold ring-1 ${cat===k ? "bg-slate-900 text-white ring-slate-900" : "bg-white text-slate-600 ring-slate-200 hover:ring-slate-300"}`}>
                    <span>{c.emoji}</span>{c.t}
                  </button>
                ))}
              </div>
            </Field>
            <Field label="ความรุนแรง">
              <div className="flex gap-1.5">
                {Object.entries(URGENCY).map(([k, u]) => (
                  <button key={k} type="button" onClick={() => setUrgency(k)} className={`flex flex-1 items-center justify-center gap-1 rounded-md px-2 py-1.5 text-[11.5px] font-bold ring-1 ${urgency===k ? `${u.pillBg} ${u.pillText} ${u.ring}` : "bg-white text-slate-600 ring-slate-200"}`}>
                    <span className={`h-1.5 w-1.5 rounded-full ${u.dot}`}></span>{u.t}
                  </button>
                ))}
              </div>
            </Field>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Field label="ห้อง / สถานที่ *">
              <input value={location} onChange={e=>setLocation(e.target.value)} placeholder="ห้อง 305 · ชั้น 3" className="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-[13px] outline-none focus:border-blue-400"/>
            </Field>
            <Field label="อุปกรณ์ / asset">
              <input value={asset} onChange={e=>setAsset(e.target.value)} placeholder="AC FCU · DAIKIN..." className="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-[13px] outline-none focus:border-blue-400"/>
            </Field>
          </div>
          <Field label="รายละเอียด">
            <textarea value={description} onChange={e=>setDescription(e.target.value)} rows="3" placeholder="อะไรเสีย เกิดเมื่อไหร่ แก้ไขเบื้องต้นอะไรไปแล้วบ้าง" className="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-[13px] outline-none focus:border-blue-400"/>
          </Field>
          <Field label="กระทบลูกค้า">
            <div className="flex gap-1.5">
              {[["low","ต่ำ"],["medium","ปานกลาง"],["high","สูง"]].map(([k,t]) => (
                <button key={k} type="button" onClick={() => setGuestImpact(k)} className={`flex flex-1 items-center justify-center rounded-md px-2 py-1.5 text-[11.5px] font-bold ring-1 ${guestImpact===k ? "bg-slate-900 text-white ring-slate-900" : "bg-white text-slate-600 ring-slate-200"}`}>
                  {t}
                </button>
              ))}
            </div>
          </Field>
          <Field label="รูปก่อน">
            <div className="grid place-items-center rounded-lg border border-dashed border-slate-300 bg-slate-50 px-4 py-6 hover:border-slate-400">
              <div className="flex flex-col items-center gap-1 text-slate-400">
                {I.cam}
                <span className="text-[11px] font-semibold">แตะเพื่ออัพโหลด หรือลากไฟล์มาวาง</span>
                <span className="mono text-[9.5px] text-slate-400">PNG · JPG · ≤5MB</span>
              </div>
            </div>
          </Field>
        </div>
        <div className="flex items-center justify-end gap-2 border-t border-slate-100 px-5 py-3 bg-slate-50/50">
          <button onClick={onClose} className="rounded-lg px-3 py-2 text-[12.5px] font-semibold text-slate-500 hover:text-slate-900">ยกเลิก</button>
          <button onClick={submit} disabled={!title.trim() || !location.trim()} className="rounded-lg bg-blue-600 px-4 py-2 text-[12.5px] font-bold text-white shadow-[0_8px_20px_-6px_rgba(37,99,235,0.5)] hover:bg-blue-700 disabled:opacity-40">เปิดเคส →</button>
        </div>
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <div className="mb-1 text-[11px] font-semibold text-slate-600">{label}</div>
      {children}
    </div>
  );
}

/* ============================================================ ASSIGN MODAL ============================================================ */
function AssignModal({ repair, onClose, onAssign }) {
  const [tid, setTid] = React.useState(repair.techId || TECHS[0].id);
  const [eta, setEta] = React.useState(repair.eta || "วันนี้ 16:00");
  const cat = CAT[repair.cat];
  const skillMap = { ac: "AC", plumb: "PLUMB", elec: "ELEC", net: "ELEC", appl: "GEN", lock: "GEN", furn: "GEN", gen: "GEN" };
  const needSkill = skillMap[repair.cat] || "GEN";
  const recommended = TECHS.filter(t => t.skills.includes(needSkill));
  const others = TECHS.filter(t => !t.skills.includes(needSkill));
  return (
    <div className="fixed inset-0 z-40 grid place-items-center bg-slate-900/40 px-6 backdrop-blur-sm" onClick={onClose}>
      <div className="w-full max-w-[480px] overflow-hidden rounded-2xl bg-white shadow-2xl" onClick={(e) => e.stopPropagation()} style={{ animation: "fadeIn .2s ease-out" }}>
        <div className="flex items-center justify-between border-b border-slate-100 px-5 py-3.5">
          <div>
            <div className="label">มอบหมายช่าง</div>
            <div className="text-[16px] font-bold tracking-tight">{cat.emoji} {repair.title}</div>
            <div className="mono text-[10.5px] text-slate-500">{repair.id} · {repair.location}</div>
          </div>
          <button onClick={onClose} className="grid h-8 w-8 place-items-center rounded-md text-slate-400 hover:bg-slate-50 hover:text-slate-700">{I.close}</button>
        </div>
        <div className="px-5 py-3 space-y-3">
          <div>
            <div className="label mb-2">ช่างที่เหมาะ · ทักษะ {needSkill}</div>
            <div className="space-y-1.5">
              {recommended.map(t => (
                <button key={t.id} onClick={() => setTid(t.id)} className={`flex w-full items-center gap-2.5 rounded-xl border px-3 py-2 text-left transition ${tid===t.id ? "border-blue-400 bg-blue-50 ring-2 ring-blue-100" : "border-slate-200 bg-white hover:border-slate-300"}`}>
                  <div className="grid h-9 w-9 flex-none place-items-center rounded-full text-[12px] font-bold text-white" style={{ background: t.color }}>{t.short}</div>
                  <div className="min-w-0 flex-1">
                    <div className="text-[12.5px] font-semibold">{t.name}</div>
                    <div className="text-[10.5px] text-slate-500">{t.role}</div>
                  </div>
                  <div className="flex flex-wrap justify-end gap-1">
                    {t.skills.map(s => <span key={s} className={`mono rounded px-1 py-0.5 text-[8.5px] font-bold ${s===needSkill ? "bg-blue-600 text-white" : "bg-slate-100 text-slate-500"}`}>{s}</span>)}
                  </div>
                </button>
              ))}
            </div>
          </div>
          <details>
            <summary className="cursor-pointer text-[11.5px] font-semibold text-slate-500 hover:text-slate-900">ช่างอื่น ({others.length})</summary>
            <div className="mt-2 space-y-1.5">
              {others.map(t => (
                <button key={t.id} onClick={() => setTid(t.id)} className={`flex w-full items-center gap-2.5 rounded-xl border px-3 py-2 text-left transition ${tid===t.id ? "border-blue-400 bg-blue-50" : "border-slate-200 bg-white opacity-70 hover:opacity-100"}`}>
                  <div className="grid h-8 w-8 flex-none place-items-center rounded-full text-[12px] font-bold text-white" style={{ background: t.color }}>{t.short}</div>
                  <div className="flex-1">
                    <div className="text-[12px] font-semibold">{t.name}</div>
                    <div className="text-[10.5px] text-slate-500">{t.role}</div>
                  </div>
                </button>
              ))}
            </div>
          </details>
          <Field label="ETA · เวลาที่คาดว่าช่างจะมา">
            <input value={eta} onChange={e=>setEta(e.target.value)} placeholder="วันนี้ 14:00" className="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-[13px] outline-none focus:border-blue-400"/>
          </Field>
        </div>
        <div className="flex items-center justify-end gap-2 border-t border-slate-100 px-5 py-3 bg-slate-50/50">
          <button onClick={onClose} className="rounded-lg px-3 py-2 text-[12.5px] font-semibold text-slate-500 hover:text-slate-900">ยกเลิก</button>
          <button onClick={() => onAssign(tid, eta)} className="rounded-lg bg-blue-600 px-4 py-2 text-[12.5px] font-bold text-white shadow-[0_8px_20px_-6px_rgba(37,99,235,0.5)] hover:bg-blue-700">มอบหมาย →</button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================ ROOT ============================================================ */
function App() {
  return (
    <div className="min-h-screen p-5">
      <div className="mx-auto" style={{ maxWidth: 1480 }}>
        <ChromeWindow
          tabs={[{ title: "POOIL accounting" }, { title: "AuditMe — แจ้งซ่อม" }]}
          activeIndex={1}
          url="auditme.app/workspace/repairs"
          width="100%"
          height="auto"
        >
          <div style={{ height: 920 }}>
            <RepairsPage />
          </div>
        </ChromeWindow>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
