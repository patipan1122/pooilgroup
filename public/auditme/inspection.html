<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body {
    background: #EEEEE6;
    font-family: 'IBM Plex Sans Thai', 'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-feature-settings: 'tnum'; }
  .tnum { font-feature-settings: 'tnum'; }
  @keyframes pulseDot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.4); } }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px);} to { opacity:1; transform: translateY(0);} }
  @keyframes slideUp { from { opacity:0; transform: translateY(40px);} to { opacity:1; transform: translateY(0);} }
  .scrollbar-slim::-webkit-scrollbar { width: 6px; height: 6px; }
  .scrollbar-slim::-webkit-scrollbar-thumb { background: rgba(15,23,42,0.15); border-radius: 999px; }
  .scrollbar-slim::-webkit-scrollbar-track { background: transparent; }
</style>
