<style>
  html, body {
    background: #EEEEE6;

  }
  .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-feature-settings: 'tnum'; }
  .tnum { font-feature-settings: 'tnum'; }
  @keyframes pulseDot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.4); } }
  @keyframes shimmer { 0%,100% { background-position: 200% center; } 50% { background-position: 0% center; } }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px);} to { opacity:1; transform: translateY(0);} }
  @keyframes slideUp { from { opacity:0; transform: translateY(40px);} to { opacity:1; transform: translateY(0);} }
  .scrollbar-slim::-webkit-scrollbar { width: 6px; height: 6px; }
  .scrollbar-slim::-webkit-scrollbar-thumb { background: rgba(15,23,42,0.15); border-radius: 999px; }
  .scrollbar-slim::-webkit-scrollbar-track { background: transparent; }
</style>
