# nginx HTTP → HTTPS bridge — fallback if you don't want to set up Cloudflare.
# Deploy on any cheap VPS (Hetzner CX11 ~$4/mo, DigitalOcean droplet ~$6/mo,
# or even a Raspberry Pi at the head office) that has a public IPv4 address.
#
# 1. Install nginx: apt install nginx
# 2. Drop this file into /etc/nginx/sites-available/acs-bridge.conf
# 3. ln -s /etc/nginx/sites-available/acs-bridge.conf /etc/nginx/sites-enabled/
# 4. rm /etc/nginx/sites-enabled/default
# 5. nginx -t && systemctl reload nginx
# 6. ufw allow 80/tcp   (or open port 80 on your firewall)
# 7. Point the ACS device's platformIp at: http://<VPS-PUBLIC-IP>/api/playland/acs/event?device=...&secret=...

server {
    listen 80 default_server;
    server_name _;

    # Only forward the ACS routes · everything else gets 404 to limit blast radius
    location /api/playland/acs/ {
        proxy_pass https://pooilgroup.vercel.app;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name pooilgroup.vercel.app;
        proxy_set_header Host pooilgroup.vercel.app;
        proxy_set_header X-Acs-Bridge nginx;
        proxy_set_header X-Acs-Device-Ip $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_redirect off;
        proxy_buffering off;
        proxy_read_timeout 5s;
        proxy_connect_timeout 5s;
    }

    location = /health {
        add_header Content-Type application/json;
        return 200 '{"ok":true,"service":"acs-http-bridge","upstream":"https://pooilgroup.vercel.app"}';
    }

    location / {
        add_header Content-Type application/json;
        return 404 '{"result":1,"message":"path not allowed by bridge"}';
    }
}
